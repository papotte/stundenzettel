name: E2E Tests

on:
  workflow_call:

jobs:
  e2e-tests:
    name: E2E Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chromium] #, firefox, webkit]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ms-playwright
            ~/.cache/playwright
          key: playwright-${{ hashFiles('package-lock.json') }}-${{ matrix.browser }}
          restore-keys: |
            playwright-${{ matrix.browser }}-
            playwright-

      - name: Install Playwright Browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Verify Playwright browsers
        run: npx playwright install --dry-run ${{ matrix.browser }}

      - name: Create .env.test file
        run: |
          cat > .env.test << 'EOF'
          # Test environment variables for E2E tests
          # Note: Most environment variables are now passed directly through the env section
          # This file is kept for local development compatibility
          NODE_ENV=test
          NEXT_PUBLIC_ENVIRONMENT=test
          EOF

      - name: Debug GitHub secrets availability
        run: |
          echo "🔍 DEBUG - Checking GitHub secrets availability:"
          echo "STRIPE_SECRET_KEY secret exists: $([ -n "${{ secrets.STRIPE_SECRET_KEY }}" ] && echo "true" || echo "false")"
          echo "STRIPE_SECRET_KEY secret length: ${#{{ secrets.STRIPE_SECRET_KEY }}}"
          echo "STRIPE_SECRET_KEY secret starts with sk_: ${{ startsWith(secrets.STRIPE_SECRET_KEY, 'sk_') }}"
          echo "STRIPE_SECRET_KEY secret first 10 chars: ${STRIPE_SECRET_KEY:0:10}..."
          echo "STRIPE_SECRET_KEY secret last 4 chars: ...${STRIPE_SECRET_KEY: -4}"
          echo "STRIPE_WEBHOOK_SECRET secret exists: $([ -n "${{ secrets.STRIPE_WEBHOOK_SECRET }}" ] && echo "true" || echo "false")"
          echo "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY secret exists: $([ -n "${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}" ] && echo "true" || echo "false")"
          echo "FIREBASE_PROJECT_ID secret exists: $([ -n "${{ secrets.FIREBASE_PROJECT_ID }}" ] && echo "true" || echo "false")"

      - name: Run E2E tests (${{ matrix.browser }})
        run: |
          echo "🔍 DEBUG - Environment variables in test step:"
          echo "STRIPE_SECRET_KEY exists: $([ -n "$STRIPE_SECRET_KEY" ] && echo "true" || echo "false")"
          echo "STRIPE_SECRET_KEY length: ${#STRIPE_SECRET_KEY}"
          echo "STRIPE_SECRET_KEY starts with sk_: $([ "$STRIPE_SECRET_KEY" = sk_* ] && echo "true" || echo "false")"
          echo "STRIPE_SECRET_KEY first 10 chars: ${STRIPE_SECRET_KEY:0:10}..."
          echo "STRIPE_SECRET_KEY last 4 chars: ...${STRIPE_SECRET_KEY: -4}"
          echo "NODE_ENV: $NODE_ENV"
          echo "All STRIPE env vars: $(env | grep STRIPE | wc -l) variables found"
          echo "Running E2E tests..."
          npm run test:e2e:ci -- --project=${{ matrix.browser }}
        env:
          # Firebase
          NEXT_PUBLIC_FIREBASE_API_KEY: dummy-api-key
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_PROJECT_ID }}.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_PROJECT_ID }}.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: 123456789
          NEXT_PUBLIC_FIREBASE_APP_ID: test-app-id
          NEXT_PUBLIC_FIREBASE_DATABASE_ID: test-database
          
          # Stripe
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          NEXT_PUBLIC_STRIPE_TRIAL_PERIOD_DAYS: ${{ secrets.NEXT_PUBLIC_STRIPE_TRIAL_PERIOD_DAYS }}
          NEXT_PUBLIC_STRIPE_TRIAL_ENABLED: ${{ secrets.NEXT_PUBLIC_STRIPE_TRIAL_ENABLED }}
          
          # Other
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          NODE_ENV: test
          NEXT_PUBLIC_ENVIRONMENT: test

      - name: Save Playwright browsers cache
        if: always() && steps.cache-playwright.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cache/ms-playwright
            ~/.cache/playwright
          key: playwright-${{ hashFiles('package-lock.json') }}-${{ matrix.browser }}
